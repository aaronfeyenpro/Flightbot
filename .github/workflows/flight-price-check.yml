name: Flight Price Check

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  check-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check flight price
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          FLIGHT_ORIGIN: "CDG"
          FLIGHT_DESTINATION: "SSA"
          FLIGHT_DATE: "2026-12-17"
          FLIGHT_RETURN_DATE: "2027-01-04"
          FLIGHT_MAX_PRICE: "1350"
          FLIGHT_FLEX_DAYS: "2"
        run: python scripts/check_price.py

      - name: Commit updated price state and status page
        run: |
          git config user.name "flight-price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/last_price.json docs/index.html 2>/dev/null || true
          git diff --staged --quiet || git commit -m "Update price and status page [skip ci]"
          git push
