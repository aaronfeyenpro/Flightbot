name: Flight Price Check

on:
  schedule:
    # Toutes les 6h — ajuste selon tes besoins (attention aux limites de Google Flights si trop fréquent)
    - cron: "0 */6 * * *"
  workflow_dispatch: {} # permet de lancer manuellement depuis l'onglet Actions

permissions:
  contents: write # nécessaire pour commit le fichier d'état

jobs:
  check-price:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check flight price
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
          FLIGHT_ORIGIN: "CDG"
          FLIGHT_DESTINATION: "SSA"
          FLIGHT_DATE: "2026-12-17"
          FLIGHT_MAX_PRICE: "600"
        run: python scripts/check_price.py

      - name: Commit updated price state
        run: |
          git config user.name "flight-price-bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/last_price.json
          git diff --staged --quiet || git commit -m "Update last known price [skip ci]"
          git push
